<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" type="module"></script>
</head>

<body>
    <div id="stats">
        <h3>FPS: <output id="fps-output"></output></h3>
        <h3>Particle Count: <output id="particle-count-output"></output></h3>
        <h3>Total Kinetic Energy: <output id="ke-output"></output></h3>
    </div>

    <canvas width="1080" height="720" oncontextmenu="return false;"></canvas>

    <section id="controls">
        <div class="slider" id="grab-strength">
            <label for="grab-strength-input">Grab Strength (0-1)</label>
            <input type="range" id="grab-strength-input" name="grab-strength-input" min="0" max="1" step="any">
            <output id="grab-strength-output">0.5</output>
        </div>

        <div id="particle-radius">
            <label for="radius-input">Particle Radius: </label>
            <input type="number" id="radius-input" name="radius-input" step="10" min="0.01">
        </div>

        <div id="spawn-rate">
            <label for="spawn-rate-input">Spawn Rate: </label>
            <input type="number" id="spawn-rate-input" name="spawn-rate-input" step="0.1" min="0">
        </div>

        <div id="gravity">
            <label for="gravity-input">Gravity: </label>
            <input type="number" id="gravity-input" name="gravity-input">
        </div>

        <div id="showQT">
            <label for="qt-input">Show Quad Tree Bounds</label>
            <input type="checkbox" id="qt-input" name="qt-input">
        </div>
    </section>
</body>

</html>
